<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGFN Launcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">OGFN Launcher</span>
    </div>
    <div class="titlebar-buttons">
      <button id="btn-minimize" class="titlebar-btn">−</button>
      <button id="btn-close" class="titlebar-btn btn-close">✕</button>
    </div>
  </div>

  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="logo">
        <h1>OGFN</h1>
        <p>Fortnite 24.20</p>
      </div>
      <div class="login-form">
        <button id="btn-discord-login" class="btn-discord">
          <svg class="discord-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
          Login with Discord
        </button>
        <p id="login-status" class="status-text"></p>
      </div>
    </div>
  </div>

  <div id="main-screen" class="screen">
    <div class="main-content">
      <div class="left-panel">
        <div class="player-banner">
          <div class="avatar" id="player-avatar"></div>
          <div class="player-info">
            <span id="player-username">Player</span>
            <span class="player-status">Online</span>
          </div>
        </div>
        <button id="btn-logout" class="btn-logout">Logout</button>
        <div class="server-selector">
          <label>Server</label>
          <select id="server-select">
            <option value="online">Online</option>
            <option value="offline">Offline/LAN</option>
          </select>
        </div>
        <div class="version-info">
          <span>Version:</span>
          <span id="game-version">24.20</span>
        </div>
      </div>

      <div class="center-panel">
        <div class="news-panel">
          <h2>OGFN 24.20 - Season 24</h2>
          <div class="news-content">
            <p>Welcome to the OG Fortnite experience!</p>
            <p>Season 24 brings back the classic battle royale gameplay.</p>
            <ul>
              <li>Classic weapons and items</li>
              <li>Original map locations</li>
              <li>OG building mechanics</li>
            </ul>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <button id="btn-settings" class="btn-icon" title="Settings">⚙</button>
      </div>
    </div>

    <div class="play-area">
      <div class="server-address-row">
        <label>Server Address</label>
        <input type="text" id="server-address" placeholder="http://localhost:8080" />
        <button id="btn-save-address" class="btn-save">Save</button>
      </div>
      <button id="btn-play" class="btn-play">PLAY</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
